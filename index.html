<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Math Practice - Master Round</title>
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --success: #00b894; --danger: #d63031; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .main-container { background: #ffffff; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .header-section { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 15px; }
        .date-badge { background: var(--accent); color: white; padding: 5px 15px; border-radius: 50px; font-size: 13px; display: inline-block; margin-top: 10px; font-weight: bold; }
        select, input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #dfe6e9; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { background: #0771c1; }
        .hidden { display: none; }
        .q-display { font-size: 24px; font-weight: 800; margin: 25px 0; color: #2d3436; line-height: 1.4; }
        .result-score { font-size: 60px; font-weight: 900; margin: 10px 0; }
        .status-tag { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .review-box { text-align: left; max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .review-card { background: #fffafa; padding: 12px; margin-bottom: 10px; border-left: 5px solid var(--danger); border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="start-screen">
        <div class="header-section">
            <h1 style="font-size: 22px; margin:0;">Daily Math Practice</h1>
            <div class="date-badge" id="live-date"></div>
        </div>
        <select id="userName">
            <option value="">-- Apna Naam Chunain --</option>
            <option value="MOHAMMAD SAAD">MOHAMMAD SAAD</option>
            <option value="MOHAMMAD ZIYAN">MOHAMMAD ZIYAN</option>
            <option value="MOHAMMAD ZAMMAD">MOHAMMAD ZAMMAD</option>
        </select>
        <button class="btn-action" onclick="initQuiz()">Start Round</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="q-counter" style="color: #b2bec3; font-weight: bold; font-size: 12px;"></div>
        <div class="q-display" id="q-text"></div>
        <input type="number" id="answer-field" placeholder="Type Answer..." autocomplete="off" inputmode="numeric">
        <button class="btn-action" onclick="handleNext()">Next</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="student-title" style="margin-bottom:5px;"></h2>
        <div id="pass-fail-tag" class="status-tag"></div>
        <div class="result-score" id="score-text"></div>
        <button class="btn-action" onclick="showCorrections()">Review Mistakes</button>
        <button class="btn-action" style="background:#636e72; margin-top:10px;" onclick="location.reload()">Restart</button>
    </div>

    <div id="review-screen" class="hidden">
        <h3>Mistakes Review</h3>
        <div id="review-list" class="review-box"></div>
        <button class="btn-action" onclick="location.reload()">Back to Home</button>
    </div>
</div>

<script>
    const quizItems = [
        { q: "920 − 280 ÷ 7 × 6 + 80", a: 760 },
        { q: "(126 ÷ 14 + 55) × 2", a: 128 },
        { q: "1080 ÷ 9 × 2 − 160", a: 80 },
        { q: "(160 ÷ 8 + 60) × 3", a: 240 },
        { q: "840 ÷ 12 × 6 + 120", a: 540 },
        { q: "(200 ÷ 10 + 75) × 2", a: 190 },
        { q: "1500 − 360 ÷ 9 × 5 + 70", a: 1370 },
        { q: "(144 ÷ 12 + 48) × 3", a: 180 },
        { q: "1260 ÷ 14 × 4 − 180", a: 180 },
        { q: "(225 ÷ 15 + 65) × 2", a: 160 },
        { q: "980 ÷ 7 × 3 + 150", a: 570 },
        { q: "(180 ÷ 9 + 72) × 4", a: 368 },
        { q: "1750 − 420 ÷ 7 × 8 + 90", a: 1360 },
        { q: "(256 ÷ 16 + 84) × 5", a: 500 },
        { q: "1320 ÷ 11 × 5 − 240", a: 360 },
        { q: "(300 ÷ 15 + 95) × 3", a: 345 },
        { q: "1680 ÷ 12 × 4 + 210", a: 770 },
        { q: "(196 ÷ 14 + 88) × 2", a: 204 },
        { q: "2100 − 540 ÷ 9 × 6 + 120", a: 1860 },
        { q: "(400 ÷ 20 + 125) × 4", a: 580 }
    ];

    let current = 0, points = 0, uName = "", errors = [];
    document.getElementById('live-date').innerText = "📅 " + new Date().toLocaleDateString('en-GB');

    function initQuiz() {
        uName = document.getElementById('userName').value;
        if (!uName) return alert("Please select a name!");
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQ();
    }

    function loadQ() {
        document.getElementById('q-counter').innerText = `STEP ${current + 1} / ${quizItems.length}`;
        document.getElementById('q-text').innerText = quizItems[current].q;
        document.getElementById('answer-field').value = "";
        document.getElementById('answer-field').focus();
    }

    function handleNext() {
        const val = document.getElementById('answer-field').value;
        if (val === "") return;
        if (parseInt(val) === quizItems[current].a) { points++; } 
        else { errors.push({ q: quizItems[current].q, u: val, c: quizItems[current].a }); }
        current++;
        if (current < quizItems.length) loadQ();
        else showFinal();
    }

    function showFinal() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const tag = document.getElementById('pass-fail-tag');
        const score = document.getElementById('score-text');
        
        // Fail logic: 5 or more mistakes
        if (errors.length >= 5) {
            document.getElementById('student-title').innerText = uName + " - FAILED ❌";
            tag.innerText = "Kafi galtiyan hain! Aur mehnat karo.";
            tag.style.color = "var(--danger)";
            score.style.color = "var(--danger)";
        } else {
            document.getElementById('student-title').innerText = uName + " - PASSED ✅";
            tag.innerText = "Shabaash! Boht acha result hai.";
            tag.style.color = "var(--success)";
            score.style.color = "var(--success)";
        }
        score.innerText = points + "/" + quizItems.length;
    }

    function showCorrections() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.remove('hidden');
        const list = document.getElementById('review-list');
        list.innerHTML = errors.length === 0 ? "<h3 style='text-align:center; color:green;'>Zero Mistakes! You are a genius.</h3>" : "";
        errors.forEach(e => {
            list.innerHTML += `<div class="review-card"><strong>${e.q}</strong><br>Aapka: ${e.u} | <span style="color:green; font-weight:bold;">Sahi: ${e.c}</span></div>`;
        });
    }

    document.getElementById('answer-field').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleNext(); });
</script>
</body>
</html>
